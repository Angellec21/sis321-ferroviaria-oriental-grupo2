global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
    - targets: ["localhost:9090"]

  - job_name: "dss-ferroviaria-backend"
    metrics_path: "/metrics"
    static_configs:
    - targets: ["localhost:3000", "localhost:3001"]
      labels:
        servicio: "dss-backend"
