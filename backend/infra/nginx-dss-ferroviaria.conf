# ============================================
# Balanceador de Carga (Nginx) - DSS Ferroviaria Oriental
# Equivale al nodo "Balanceador de Carga (Nginx)" del diagrama de despliegue
# ============================================

# Balanceador de Carga: round-robin entre las 2 instancias del backend Node.js
upstream dss_backend {
    server 127.0.0.1:3000;
    server 127.0.0.1:3001;
}

server {
    listen 8443 ssl;
    server_name localhost;

    ssl_certificate     /opt/homebrew/etc/nginx/ssl/dss-selfsigned.crt;
    ssl_certificate_key /opt/homebrew/etc/nginx/ssl/dss-selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # App React SPA (servida por Vite en dev)
    location / {
        proxy_pass http://[::1]:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # API RESTful -> balanceada entre las 2 instancias del backend
    location /api/ {
        proxy_pass http://dss_backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://dss_backend/health;
        proxy_set_header Host $host;
    }
}
